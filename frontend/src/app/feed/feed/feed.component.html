<div class="space-y-6 pb-20 relative z-10">
  
  <div class="flex items-center justify-between mb-8">
    <h2 class="text-2xl font-bold tracking-tight text-white flex items-center space-x-2">
      <span *ngIf="modeService.currentMode().activeMode === 'ALL'">🌍 Global Feed</span>
      <span *ngIf="modeService.currentMode().activeMode !== 'ALL'">💠 {{ modeService.currentMode().activeMode | titlecase }} Feed</span>
    </h2>
  </div>

  <app-create-post (postCreated)="onPostCreated($event)"></app-create-post>

  <div *ngIf="isLoading" class="flex justify-center py-12">
    <div class="animate-spin rounded-full h-10 w-10 border-t-2 border-b-2 border-primary-500"></div>
  </div>

  <div *ngIf="!isLoading && posts.length === 0" class="glass-card p-10 text-center">
    <div class="text-4xl mb-4">📭</div>
    <h3 class="text-lg font-medium text-white mb-2">No posts found</h3>
    <p class="text-slate-400 text-sm">Nothing to see here in this mode right now. Why not create a post?</p>
  </div>

  <div *ngIf="!isLoading && posts.length > 0" class="space-y-6">
    <app-post-item 
      *ngFor="let post of posts" 
      [post]="post" 
      (postDeleted)="onPostDeleted($event)">
    </app-post-item>
  </div>

</div>
