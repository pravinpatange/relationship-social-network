<div class="tilt-card glass-card p-6 mb-8 relative">
  <div class="absolute -top-4 -left-4 w-24 h-24 bg-primary-500/20 rounded-full blur-xl pointer-events-none"></div>

  <form (ngSubmit)="onSubmit()">
    <textarea 
      [(ngModel)]="caption"
      name="caption"
      rows="3"
      class="w-full bg-slate-900/60 border border-slate-700/50 rounded-xl p-4 text-white focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent transition-all placeholder-slate-500 resize-none custom-scrollbar mb-4"
      placeholder="What's on your mind? Share with your network..."
    ></textarea>

    <div class="flex items-center justify-between mt-2">
      <div class="flex items-center space-x-3">
        <!-- Visibility Selector -->
        <select 
          [(ngModel)]="visibilityType"
          name="visibilityType"
          class="bg-slate-800/80 border border-slate-700 text-slate-300 text-sm rounded-lg focus:ring-primary-500 focus:border-primary-500 block p-2.5 transition-colors cursor-pointer outline-none">
          <option value="PUBLIC">🌍 Public</option>
          <option value="ALL_CONNECTIONS">👥 All Connections</option>
          <option value="SELECTED_GROUPS">💠 Selected Groups</option>
          <option value="PRIVATE">🔒 Private</option>
        </select>
        
        <!-- Fake Image Upload Button -->
        <button type="button" class="p-2.5 rounded-lg bg-slate-800/80 border border-slate-700 text-slate-400 hover:text-primary-400 hover:border-primary-500/50 transition-colors tooltip-trigger" title="Attach Media">
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
        </button>
      </div>

      <button 
        type="submit" 
        [disabled]="!caption.trim() || isSubmitting"
        class="bg-gradient-to-r from-primary-600 to-primary-500 hover:from-primary-500 hover:to-primary-400 text-white font-medium py-2 px-6 rounded-lg shadow-lg shadow-primary-600/30 transition-all disabled:opacity-50 disabled:cursor-not-allowed transform hover:-translate-y-0.5">
        {{ isSubmitting ? 'Posting...' : 'Post' }}
      </button>
    </div>
  </form>
</div>
