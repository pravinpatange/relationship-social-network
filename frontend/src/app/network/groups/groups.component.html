<div class="space-y-8">
  
  <!-- Create New Group -->
  <div class="glass-card p-6 border-l-4 border-secondary-500">
    <h3 class="text-lg font-bold text-white mb-4">Create a New Group</h3>
    <form (ngSubmit)="createGroup()" class="space-y-4">
      <div>
        <input 
          type="text" 
          [(ngModel)]="newGroupName" 
          name="newGroupName"
          placeholder="Group Name (e.g. Work, Family)" 
          class="w-full bg-slate-900/50 border border-slate-700/50 rounded-xl px-4 py-2.5 text-white focus:outline-none focus:ring-2 focus:ring-secondary-500"
        >
      </div>
      <div class="flex space-x-4">
        <input 
          type="text" 
          [(ngModel)]="newGroupDescription" 
          name="newGroupDescription"
          placeholder="Short description (optional)" 
          class="flex-1 bg-slate-900/50 border border-slate-700/50 rounded-xl px-4 py-2.5 text-white focus:outline-none focus:ring-2 focus:ring-secondary-500"
        >
        <button 
          type="submit"
          [disabled]="!newGroupName"
          class="bg-secondary-600 hover:bg-secondary-500 text-white font-medium px-6 py-2.5 rounded-xl transition-all shadow-lg shadow-secondary-600/30 disabled:opacity-50">
          Create Group
        </button>
      </div>
    </form>
  </div>

  <div *ngIf="isLoading" class="flex justify-center py-8">
    <div class="animate-spin rounded-full h-8 w-8 border-t-2 border-b-2 border-secondary-500"></div>
  </div>

  <!-- My Groups -->
  <div *ngIf="!isLoading">
    <div *ngIf="groups.length === 0" class="glass-card p-10 text-center border-dashed border-2 border-slate-700/50">
      <div class="text-4xl mb-4">💠</div>
      <h3 class="text-lg font-medium text-white mb-2">No groups yet</h3>
      <p class="text-slate-400 text-sm">Create a group to start organizing your network.</p>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <div *ngFor="let group of groups" class="tilt-card glass-card p-6 group relative overflow-hidden">
        <!-- Decoration -->
        <div class="absolute -right-10 -bottom-10 w-32 h-32 bg-secondary-500/10 rounded-full blur-2xl pointer-events-none"></div>

        <div class="flex justify-between items-start mb-4 relative z-10">
          <div>
            <h4 class="text-xl font-bold text-white mb-1">{{ group.groupName }}</h4>
            <p class="text-sm text-slate-400">{{ group.description || 'No description provided' }}</p>
          </div>
          <button (click)="deleteGroup(group.id)" class="text-slate-500 hover:text-red-400 p-2 rounded-lg bg-slate-800/50 opacity-0 group-hover:opacity-100 transition-all shadow">
            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
          </button>
        </div>

        <div class="flex items-center justify-between text-xs text-slate-500 border-t border-slate-700/30 pt-4 mt-4 relative z-10">
          <span class="flex items-center space-x-1">
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" /></svg>
            <span>Members</span>
          </span>
          <span>Created {{ group.createdAt | date }}</span>
        </div>
      </div>
    </div>
  </div>

</div>
