<div class="space-y-6 pb-20 relative z-10">
  
  <div *ngIf="isLoading" class="flex justify-center py-12">
    <div class="animate-spin rounded-full h-10 w-10 border-t-2 border-b-2 border-primary-500"></div>
  </div>

  <div *ngIf="!isLoading && user" class="glass-card overflow-hidden">
    <!-- Profile Cover & Avatar -->
    <div class="h-48 bg-gradient-to-r from-primary-600 via-secondary-500 to-primary-800 relative">
      <div class="absolute inset-0 bg-slate-900/20"></div>
      
      <div class="absolute -bottom-16 left-8">
        <div class="h-32 w-32 rounded-full border-4 border-slate-900 bg-slate-800 flex items-center justify-center text-5xl font-bold text-white shadow-xl shadow-slate-900/50">
          {{ user.displayName?.charAt(0) || 'U' }}
        </div>
      </div>
      
      <div class="absolute top-4 right-4">
        <button 
          *ngIf="!isEditing"
          (click)="toggleEdit()"
          class="bg-slate-900/60 hover:bg-slate-900/80 backdrop-blur-md text-white px-4 py-2 rounded-lg font-medium text-sm transition-colors shadow">
          Edit Profile
        </button>
      </div>
    </div>

    <!-- Profile Info (View Mode) -->
    <div *ngIf="!isEditing" class="pt-20 px-8 pb-8">
      <div class="flex justify-between items-start">
        <div>
          <h2 class="text-3xl font-bold text-white">{{ user.displayName }}</h2>
          <p class="text-slate-400 text-lg">@{{ user.username }}</p>
        </div>
        <div class="flex space-x-6 text-center">
          <div>
            <div class="text-2xl font-bold text-white">0</div>
            <div class="text-xs text-slate-400 uppercase tracking-wider">Posts</div>
          </div>
          <div>
            <div class="text-2xl font-bold text-white">0</div>
            <div class="text-xs text-slate-400 uppercase tracking-wider">Connections</div>
          </div>
        </div>
      </div>

      <div class="mt-6 space-y-4">
        <div *ngIf="user.bio" class="text-slate-300 bg-slate-800/50 p-4 rounded-xl border border-slate-700/50">
          {{ user.bio }}
        </div>
        <div class="flex flex-wrap gap-4 text-sm text-slate-400">
          <div *ngIf="user.location" class="flex items-center space-x-2">
            <svg class="w-5 h-5 text-secondary-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
            <span>{{ user.location }}</span>
          </div>
          <div *ngIf="user.website" class="flex items-center space-x-2">
            <svg class="w-5 h-5 text-secondary-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1" /></svg>
            <a [href]="user.website" target="_blank" class="text-primary-400 hover:underline">{{ user.website }}</a>
          </div>
        </div>
      </div>
    </div>

    <!-- Profile Info (Edit Mode) -->
    <div *ngIf="isEditing" class="pt-20 px-8 pb-8">
      <form (ngSubmit)="saveProfile()" class="space-y-5">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
          <div>
            <label class="block text-sm font-medium text-slate-300 mb-1">Display Name</label>
            <input type="text" [(ngModel)]="editData.displayName" name="displayName" class="w-full bg-slate-900/50 border border-slate-700/50 rounded-xl px-4 py-2.5 text-white focus:outline-none focus:ring-2 focus:ring-primary-500">
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-300 mb-1">Location</label>
            <input type="text" [(ngModel)]="editData.location" name="location" class="w-full bg-slate-900/50 border border-slate-700/50 rounded-xl px-4 py-2.5 text-white focus:outline-none focus:ring-2 focus:ring-primary-500">
          </div>
        </div>
        
        <div>
          <label class="block text-sm font-medium text-slate-300 mb-1">Website</label>
          <input type="text" [(ngModel)]="editData.website" name="website" class="w-full bg-slate-900/50 border border-slate-700/50 rounded-xl px-4 py-2.5 text-white focus:outline-none focus:ring-2 focus:ring-primary-500">
        </div>

        <div>
          <label class="block text-sm font-medium text-slate-300 mb-1">Bio</label>
          <textarea [(ngModel)]="editData.bio" name="bio" rows="4" class="w-full bg-slate-900/50 border border-slate-700/50 rounded-xl px-4 py-2.5 text-white focus:outline-none focus:ring-2 focus:ring-primary-500 custom-scrollbar resize-none"></textarea>
        </div>

        <div class="flex justify-end space-x-3 pt-4 border-t border-slate-700/30">
          <button type="button" (click)="toggleEdit()" class="px-5 py-2.5 rounded-xl font-medium text-slate-300 hover:bg-slate-800 transition-colors">Cancel</button>
          <button type="submit" class="px-5 py-2.5 rounded-xl font-medium bg-primary-600 hover:bg-primary-500 text-white shadow-lg shadow-primary-600/30 transition-all">Save Changes</button>
        </div>
      </form>
    </div>
  </div>

</div>
