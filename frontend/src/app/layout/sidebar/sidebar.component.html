<aside class="w-72 glass-panel h-screen flex flex-col fixed left-0 top-0 pt-6 pb-4 px-4 z-40">
  <div class="flex items-center space-x-3 px-2 mb-8">
    <div class="h-10 w-10 rounded-xl bg-gradient-to-tr from-primary-500 to-secondary-500 flex items-center justify-center shadow-lg shadow-primary-500/30">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6 text-white">
        <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 21v-7.5a2.25 2.25 0 014.5 0v3m-3-3h3m-9-3V21m0-10.5V7.5a2.25 2.25 0 014.5 0v3m-3-3h3M4 19.5v-15A2.25 2.25 0 016.25 2.25h11.5A2.25 2.25 0 0120 4.5v15" />
      </svg>
    </div>
    <span class="text-xl font-bold tracking-tight text-gradient">Relationship Net</span>
  </div>

  <!-- Navigation Links -->
  <nav class="space-y-2 flex-grow">
    <div class="text-xs font-semibold uppercase tracking-wider text-slate-500 mb-3 px-2">Menu</div>
    
    <a routerLink="/app/feed" routerLinkActive="bg-primary-500/20 text-primary-400 border-r-2 border-primary-500" class="flex items-center space-x-3 px-3 py-2.5 rounded-lg hover:bg-slate-800/50 text-slate-300 transition-colors">
      <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10a2 2 0 012 2v1m2 13a2 2 0 01-2-2V7m2 13a2 2 0 002-2V9a2 2 0 00-2-2h-2m-4-3H9M7 16h6M7 8h6v4H7V8z" /></svg>
      <span class="font-medium">My Feed</span>
    </a>

    <a routerLink="/app/network" routerLinkActive="bg-primary-500/20 text-primary-400 border-r-2 border-primary-500" class="flex items-center space-x-3 px-3 py-2.5 rounded-lg hover:bg-slate-800/50 text-slate-300 transition-colors">
      <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" /></svg>
      <span class="font-medium">My Network</span>
    </a>
    
    <a routerLink="/app/profile" routerLinkActive="bg-primary-500/20 text-primary-400 border-r-2 border-primary-500" class="flex items-center space-x-3 px-3 py-2.5 rounded-lg hover:bg-slate-800/50 text-slate-300 transition-colors">
      <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>
      <span class="font-medium">My Profile</span>
    </a>
  </nav>

  <!-- Interactive Mode Switcher -->
  <div class="mb-6">
    <div class="text-xs font-semibold uppercase tracking-wider text-slate-500 mb-3 px-2">Active Mode</div>
    <div class="bg-slate-900/60 p-3 rounded-2xl border border-slate-800">
      
      <button 
        (click)="setMode('ALL')"
        [class.bg-primary-600]="modeService.currentMode().activeMode === 'ALL'"
        [class.text-white]="modeService.currentMode().activeMode === 'ALL'"
        [class.shadow-lg]="modeService.currentMode().activeMode === 'ALL'"
        [class.shadow-primary-600_20]="modeService.currentMode().activeMode === 'ALL'"
        class="w-full flex items-center justify-start space-x-3 py-2 px-3 rounded-xl hover:bg-slate-800 text-slate-400 font-medium text-sm transition duration-200 mb-2">
        <span>🌍</span>
        <span>All Mode</span>
      </button>

      <button 
        *ngFor="let group of groups"
        (click)="setMode(group.groupName.toUpperCase(), group.id)"
        [class.bg-primary-600]="modeService.currentMode().activeGroupId === group.id"
        [class.text-white]="modeService.currentMode().activeGroupId === group.id"
        [class.shadow-lg]="modeService.currentMode().activeGroupId === group.id"
        [class.shadow-primary-600_20]="modeService.currentMode().activeGroupId === group.id"
        class="w-full flex items-center justify-start space-x-3 py-2 px-3 rounded-xl hover:bg-slate-800 text-slate-400 font-medium text-sm transition duration-200 mb-1">
        <span>💠</span>
        <span>{{ group.groupName }} Mode</span>
      </button>
    </div>
  </div>

  <!-- Logout -->
  <div>
    <button (click)="logout()" class="w-full flex items-center space-x-3 px-3 py-2.5 rounded-lg hover:bg-red-900/30 text-slate-400 hover:text-red-400 transition-colors">
      <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" /></svg>
      <span class="font-medium">Logout</span>
    </button>
  </div>
</aside>
